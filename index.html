<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplicacions de la IA</title>
    <base href="./">
    <script>
      // Interceptar TODAS las cargas de recursos
      (function() {
        const basePath = './';
        
        // Interceptar fetch
        const originalFetch = window.fetch;
        window.fetch = function(url, options) {
          if (typeof url === 'string' && url.startsWith('/') && !url.startsWith('//')) {
            url = basePath + url.substring(1);
          }
          return originalFetch(url, options);
        };
        
        // Interceptar XMLHttpRequest
        const originalOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url, async, user, password) {
          if (typeof url === 'string' && url.startsWith('/') && !url.startsWith('//')) {
            url = basePath + url.substring(1);
          }
          return originalOpen.call(this, method, url, async, user, password);
        };
        
        // Interceptar creación de imágenes
        const originalImageSrc = Object.getOwnPropertyDescriptor(Image.prototype, 'src');
        Object.defineProperty(Image.prototype, 'src', {
          set: function(value) {
            if (typeof value === 'string' && value.startsWith('/') && !value.startsWith('//')) {
              value = basePath + value.substring(1);
            }
            originalImageSrc.set.call(this, value);
          },
          get: originalImageSrc.get
        });
        
        // Interceptar creación de elementos con src
        const originalCreateElement = document.createElement;
        document.createElement = function(tagName) {
          const element = originalCreateElement.call(document, tagName);
          if (tagName.toLowerCase() === 'img') {
            const originalSetAttribute = element.setAttribute;
            element.setAttribute = function(name, value) {
              if ((name === 'src' || name === 'data-src') && typeof value === 'string' && value.startsWith('/') && !value.startsWith('//')) {
                value = basePath + value.substring(1);
              }
              return originalSetAttribute.call(this, name, value);
            };
          }
          return element;
        };
      })();
    </script>
