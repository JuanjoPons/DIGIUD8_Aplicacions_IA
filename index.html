<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplicacions de la IA</title>
    <base href="./">
    <script>
      // Interceptar TODAS las cargas de recursos
      (function() {
        const basePath = './';
        
        // Interceptar fetch
        const originalFetch = window.fetch;
        window.fetch = function(url, options) {
          if (typeof url === 'string' && url.startsWith('/') && !url.startsWith('//')) {
            url = basePath + url.substring(1);
          }
          return originalFetch(url, options);
        };
        
        // Interceptar XMLHttpRequest
        const originalOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url, async, user, password) {
          if (typeof url === 'string' && url.startsWith('/') && !url.startsWith('//')) {
            url = basePath + url.substring(1);
          }
          return originalOpen.call(this, method, url, async, user, password);
        };
        
        // Interceptar creación de imágenes
        const originalImageSrc = Object.getOwnPropertyDescriptor(Image.prototype, 'src');
        Object.defineProperty(Image.prototype, 'src', {
          set: function(value) {
            if (typeof value === 'string' && value.startsWith('/') && !value.startsWith('//')) {
              value = basePath + value.substring(1);
            }
            originalImageSrc.set.call(this, value);
          },
          get: originalImageSrc.get
        });
        
        // Interceptar creación de elementos con src
        const originalCreateElement = document.createElement;
        document.createElement = function(tagName) {
          const element = originalCreateElement.call(document, tagName);
          if (tagName.toLowerCase() === 'img') {
            const originalSetAttribute = element.setAttribute;
            element.setAttribute = function(name, value) {
              if ((name === 'src' || name === 'data-src') && typeof value === 'string' && value.startsWith('/') && !value.startsWith('//')) {
                value = basePath + value.substring(1);
              }
              return originalSetAttribute.call(this, name, value);
            };
          }
          return element;
        };
      })();
    </script>
    <style>
      * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif !important; }
    </style>
    <script type="module" crossorigin src="./assets/index-CbHCAPU1.js"></script>

  <body>
    <div id="root"></div>
<script>
  // Afegeix el botó d'Activitats al menú quan React acaba de renderitzar
  function injectActivitatsBtn() {
    const nav = document.querySelector('nav');
    if (!nav) { setTimeout(injectActivitatsBtn, 300); return; }
    if (document.getElementById('btn-activitats')) return;

    const btn = document.createElement('a');
    btn.id = 'btn-activitats';
    btn.href = './activitats.html';
    btn.innerHTML = `
      <span style="display:inline-flex;align-items:center;gap:6px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        ACTIVITATS
      </span>`;

    // Copia l'estil de l'últim element del menú
    const lastItem = nav.querySelector('a:last-child, button:last-child');
    if (lastItem) {
      btn.className = lastItem.className;
    }

    btn.style.cursor = 'pointer';
    btn.style.textDecoration = 'none';
    nav.appendChild(btn);
  }
  document.addEventListener('DOMContentLoaded', () => setTimeout(injectActivitatsBtn, 500));
</script>
  </body>
</html>
